# SPEED FIRST
add_newline = false
# Bail quickly if any module is slow (prevents lag in huge repos)
command_timeout = 200

# Only render what we care about, in this order.
format = "$directory$git_branch$git_status$character"

# ── Directory ────────────────────────────────────────────────────────────────
# [directory]
# truncate_to_repo = true
# truncation_length = 3

# ── Git (branch + minimal status) ───────────────────────────────────────────
[git_branch]
symbol = " "
format = "[$symbol$branch]($style) "
style = "bold purple"

[git_status]
format = '([\[$all_status$ahead_behind\]]($style) )'
# style = "bold yellow"
ignore_submodules = true

# Show counts
conflicted = "[=$count](bold red) "
staged     = "[+$count](green) "
modified   = "[!$count](yellow) "
renamed    = "[»$count](bold cyan) "
deleted    = "[✘$count](red) "
untracked  = "[?$count](bold red) "
stashed    = "[$$count](blue) "
ahead      = "[⇡$count](cyan) "
behind     = "[⇣$count](cyan) "
diverged   = "[⇕$count](cyan) "

[nodejs]
disabled=true
detect_files = ["package.json", ".nvmrc", ".node-version"]
format = " [${symbol}$version]($style) "
symbol = " "
style = "bold green"

[python]
disabled=true
detect_folders = [".venv", "venv"]
detect_files = ["pyproject.toml", "requirements.txt", "Pipfile", ".python-version"]
symbol = "🐍 "
format = " [${symbol}$version]($style) "
style = "bold yellow"

[java]
disabled = true

[lua]
disabled = true

[package]
disabled = true

[docker_context]
disabled = true

[aws]
disabled = true
